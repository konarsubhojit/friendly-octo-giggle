version: 2.1

jobs:
  build:
    docker:
      # See: https://circleci.com/developer/images/image/cimg/node
      - image: cimg/node:22.3

    steps:
      - checkout

      - restore_cache:
          keys:
            - npm-deps-{{ checksum "package-lock.json" }}
            - npm-deps-

      - run:
          name: Install dependencies
          command: npm ci

      - save_cache:
          key: npm-deps-{{ checksum "package-lock.json" }}
          paths:
            - ~/.npm

      - run:
          name: Build
          command: npm run build
          environment:
            DATABASE_URL: postgresql://localhost/ci_placeholder
            NEXTAUTH_SECRET: ci-secret-placeholder
            NEXTAUTH_URL: http://localhost:3000

workflows:
  ci:
    jobs:
      - build