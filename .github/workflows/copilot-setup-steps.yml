name: "Copilot Setup Steps"
on:
  workflow_dispatch:
  push:
    paths:
      - .github/workflows/copilot-setup-steps.yml
  pull_request:
    paths:
      - .github/workflows/copilot-setup-steps.yml

jobs:
  # The job MUST be called `copilot-setup-steps` or it will not be picked up by Copilot.
  copilot-setup-steps:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "npm"

      - name: Install JavaScript dependencies
        run: npm ci

      - name: Generate .env.local from Copilot secrets
        env:
          COPILOT_DATABASE_URL: ${{ secrets.COPILOT_DATABASE_URL }}
          COPILOT_UPSTASH_REDIS_REST_URL: ${{ secrets.COPILOT_UPSTASH_REDIS_REST_URL }}
          COPILOT_UPSTASH_REDIS_REST_TOKEN: ${{ secrets.COPILOT_UPSTASH_REDIS_REST_TOKEN }}
          COPILOT_UPSTASH_SEARCH_REST_URL: ${{ secrets.COPILOT_UPSTASH_SEARCH_REST_URL }}
          COPILOT_UPSTASH_SEARCH_REST_TOKEN: ${{ secrets.COPILOT_UPSTASH_SEARCH_REST_TOKEN }}
          COPILOT_UPSTASH_SEARCH_REST_READONLY_TOKEN: ${{ secrets.COPILOT_UPSTASH_SEARCH_REST_READONLY_TOKEN }}
          COPILOT_BLOB_READ_WRITE_TOKEN: ${{ secrets.COPILOT_BLOB_READ_WRITE_TOKEN }}
          COPILOT_DEV_EMAIL: ${{ secrets.COPILOT_DEV_EMAIL }}
          COPILOT_DEV_PASS: ${{ secrets.COPILOT_DEV_PASS }}
        run: node scripts/generate-env.mjs

      - name: Install Playwright browsers (Chromium only)
        run: npx playwright install --with-deps chromium
