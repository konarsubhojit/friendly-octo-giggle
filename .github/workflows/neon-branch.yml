name: Create/Delete Branch for Pull Request

on:
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
      - closed
  push:
    branches:
      - "copilot/**"

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}

jobs:
  setup:
    name: Setup
    outputs:
      branch: ${{ steps.branch_name.outputs.current_branch }}
      pr_number: ${{ steps.pr_number.outputs.pr_number }}
    runs-on: ubuntu-latest
    steps:
      - name: Get branch name
        id: branch_name
        uses: tj-actions/branch-names@v8

      - name: Resolve pull request number
        id: pr_number
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "pr_number=${{ github.event.number }}" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          pr_number="$(gh pr list \
            --repo "${{ github.repository }}" \
            --head "${{ steps.branch_name.outputs.current_branch }}" \
            --state open \
            --json number \
            --jq '.[0].number // empty')"

          echo "pr_number=$pr_number" >> "$GITHUB_OUTPUT"

  create_neon_branch:
    name: Create Neon Branch
    outputs:
      db_url: ${{ steps.create_neon_branch.outputs.db_url }}
      db_url_with_pooler: ${{ steps.create_neon_branch.outputs.db_url_with_pooler }}
    needs: setup
    if: |
      (
        github.event_name == 'pull_request' && (
          github.event.action == 'synchronize'
          || github.event.action == 'opened'
          || github.event.action == 'reopened'
        )
      ) || (
        github.event_name == 'push' &&
        needs.setup.outputs.pr_number != ''
      )
    runs-on: ubuntu-latest
    steps:
      - name: Get branch expiration date as an env variable (2 weeks from now)
        id: get_expiration_date
        run: echo "EXPIRES_AT=$(date -u --date '+14 days' +'%Y-%m-%dT%H:%M:%SZ')" >> "$GITHUB_ENV"

      - name: Create Neon Branch
        id: create_neon_branch
        uses: neondatabase/create-branch-action@v6
        with:
          project_id: ${{ vars.NEON_PROJECT_ID }}
          branch_name: preview/pr-${{ needs.setup.outputs.pr_number }}-${{ needs.setup.outputs.branch }}
          api_key: ${{ secrets.NEON_API_KEY }}
          expires_at: ${{ env.EXPIRES_AT }}

      - name: Create or update COPILOT_DATABASE_URL in Copilot environment
        env:
          GH_TOKEN: ${{ github.token }}
          DB_URL: ${{ steps.create_neon_branch.outputs.db_url_with_pooler }}
        run: |
          gh api \
            --method PUT \
            /repos/${{ github.repository }}/environments/copilot/variables/COPILOT_DATABASE_URL \
            -f name=COPILOT_DATABASE_URL \
            -f value="$DB_URL"

  delete_neon_branch:
    name: Delete Neon Branch
    needs: setup
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    steps:
      - name: Delete Neon Branch
        uses: neondatabase/delete-branch-action@v3
        with:
          project_id: ${{ vars.NEON_PROJECT_ID }}
          branch: preview/pr-${{ github.event.number }}-${{ needs.setup.outputs.branch }}
          api_key: ${{ secrets.NEON_API_KEY }}

      - name: Delete COPILOT_DATABASE_URL from Copilot environment if it exists
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh api /repos/${{ github.repository }}/environments/Copilot/variables/COPILOT_DATABASE_URL >/dev/null 2>&1; then
            gh api \
              --method DELETE \
              /repos/${{ github.repository }}/environments/Copilot/variables/COPILOT_DATABASE_URL
          else
            echo "COPILOT_DATABASE_URL does not exist; skipping deletion."
          fi
