name: Create/Delete Branch for Pull Request

on:
  pull_request:
    types:
      - opened
      - closed

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}

jobs:
  create_neon_branch:
    name: Create Neon Branch
    if: github.event.action == 'opened'
    runs-on: ubuntu-latest
    steps:
      - name: Get branch expiration date as an env variable (2 weeks from now)
        id: get_expiration_date
        run: echo "EXPIRES_AT=$(date -u --date '+14 days' +'%Y-%m-%dT%H:%M:%SZ')" >> "$GITHUB_ENV"

      - name: Create Neon Branch
        id: create_neon_branch
        uses: neondatabase/create-branch-action@v6
        with:
          project_id: ${{ vars.NEON_PROJECT_ID }}
          branch_name: preview/pr-${{ github.event.number }}
          api_key: ${{ secrets.NEON_API_KEY }}
          expires_at: ${{ env.EXPIRES_AT }}

      - name: Fetch connection URI from Neon API
        id: get_db_url
        run: |
          response_file=$(mktemp)
          http_status=$(curl -sS \
            -o "$response_file" \
            -w "%{http_code}" \
            "https://console.neon.tech/api/v2/projects/${{ vars.NEON_PROJECT_ID }}/connection_uri?branch_id=${{ steps.create_neon_branch.outputs.branch_id }}&role_name=neondb_owner&database_name=neondb&pooled=true" \
            -H "Authorization: Bearer ${{ secrets.NEON_API_KEY }}")

          if [ "$http_status" != "200" ]; then
            echo "Failed to resolve a Neon pooled connection URI (HTTP $http_status)."
            cat "$response_file"
            rm -f "$response_file"
            exit 1
          fi

          DB_URL=$(jq -r '.uri' "$response_file")
          rm -f "$response_file"

          if [ -z "$DB_URL" ] || [ "$DB_URL" = "null" ]; then
            echo "Failed to resolve a Neon pooled connection URI."
            exit 1
          fi

          echo "DB_URL=$DB_URL" >> "$GITHUB_ENV"

      - name: Set COPILOT_DATABASE_URL as secret in copilot environment
        env:
          GH_TOKEN: ${{ secrets.GH_SECRET_MANAGE }}
        run: |
          gh secret set COPILOT_DATABASE_URL \
            --env copilot \
            --body "$DB_URL" \
            --repo "${{ github.repository }}"

  delete_neon_branch:
    name: Delete Neon Branch
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    steps:
      - name: Delete Neon Branch
        uses: neondatabase/delete-branch-action@v3
        with:
          project_id: ${{ vars.NEON_PROJECT_ID }}
          branch: preview/pr-${{ github.event.number }}
          api_key: ${{ secrets.NEON_API_KEY }}

      - name: Delete COPILOT_DATABASE_URL secret from copilot environment if it exists
        env:
          GH_TOKEN: ${{ secrets.GH_SECRET_MANAGE }}
        run: |
          secret_name=$(gh secret list \
            --env copilot \
            --repo "${{ github.repository }}" \
            --json name \
            --jq '.[] | select(.name=="COPILOT_DATABASE_URL") | .name')

          if [ -z "$secret_name" ]; then
            echo "COPILOT_DATABASE_URL does not exist; skipping deletion."
            exit 0
          fi

          gh secret delete COPILOT_DATABASE_URL \
            --env copilot \
            --repo "${{ github.repository }}"
