name: Build
on:
  push:
    branches:
      - master
  pull_request:
    types: [opened, synchronize, reopened]
jobs:
  build:
    name: Build and Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0 # Shallow clones should be disabled for a better relevancy of analysis

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Run tests with coverage
        run: npm run test:coverage

      - name: Build
        run: npm run build
        env:
          DATABASE_URL: postgresql://localhost/ci_placeholder
          NEXTAUTH_SECRET: ci-secret-placeholder
          NEXTAUTH_URL: http://localhost:3000

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v7
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.coverage.exclusions=app/**/page.tsx,app/**/layout.tsx,app/**/loading.tsx,app/**/error.tsx,lib/schema.ts,lib/db.ts,lib/email/providers.ts,lib/constants/categories.ts,lib/search-service.ts
