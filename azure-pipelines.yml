trigger:
  branches:
    include:
      - develop
  paths:
    exclude:
      - docs/**
      - specs/**
      - '**/*.md'
      - .cursorrules

pr:
  branches:
    include:
      - develop
      - master
  paths:
    exclude:
      - docs/**
      - specs/**
      - '**/*.md'
      - .cursorrules

variables:
  NODE_VERSION: '22'
  NPM_CI_FLAGS: '--cache $(npm_config_cache) --no-audit --no-fund'
  NODE_MODULES_CACHE_PATH: $(System.DefaultWorkingDirectory)/node_modules
  npm_config_cache: $(Pipeline.Workspace)/.npm

pool:
  vmImage: 'ubuntu-latest'

stages:
  - stage: LintAndTest
    displayName: Lint, Type Check & Test
    jobs:
      - job: Lint
        displayName: Lint and Type Check
        steps:
          - task: NodeTool@0
            displayName: Set up Node.js
            inputs:
              versionSpec: $(NODE_VERSION)

          - task: Cache@2
            displayName: Cache node_modules
            inputs:
              key: 'node_modules | "$(Agent.OS)" | "$(NODE_VERSION)" | package-lock.json'
              restoreKeys: |
                node_modules | "$(Agent.OS)" | "$(NODE_VERSION)"
              path: $(NODE_MODULES_CACHE_PATH)
              cacheHitVar: NODE_MODULES_CACHE_RESTORED

          - script: npm ci $(NPM_CI_FLAGS)
            displayName: Install dependencies (cache miss)
            condition: ne(variables.NODE_MODULES_CACHE_RESTORED, 'true')

          - script: npm run lint
            displayName: Lint

          - script: npx tsc --noEmit -p tsconfig.check.json
            displayName: Type check

      - job: Test
        displayName: Test
        pool:
          ${{ if and(ne(variables['Build.Reason'], 'PullRequest'), or(eq(variables['Build.SourceBranch'], 'refs/heads/develop'), eq(variables['Build.SourceBranch'], 'refs/heads/master'))) }}:
            name: default
          ${{ else }}:
            vmImage: 'ubuntu-latest'
        steps:
          - task: NodeTool@0
            displayName: Set up Node.js
            inputs:
              versionSpec: $(NODE_VERSION)

              path: $(npm_config_cache)

          - task: Cache@2
            displayName: Cache node_modules
            inputs:
              key: 'node_modules | "$(Agent.OS)" | "$(NODE_VERSION)" | package-lock.json'
              restoreKeys: |
                node_modules | "$(Agent.OS)" | "$(NODE_VERSION)"
              path: $(NODE_MODULES_CACHE_PATH)
              cacheHitVar: NODE_MODULES_CACHE_RESTORED

          - script: npm ci $(NPM_CI_FLAGS)
            displayName: Install dependencies (cache miss)
            condition: ne(variables.NODE_MODULES_CACHE_RESTORED, 'true')

          - script: |
              if [ "$(Build.SourceBranch)" = "refs/heads/develop" ]; then
                npm run test:coverage
              else
                npm run test
              fi
            displayName: Run tests (coverage on develop)

          - task: PublishPipelineArtifact@1
            displayName: Upload coverage report
            condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/develop'))
            inputs:
              targetPath: coverage
              artifact: coverage-report
              publishLocation: pipeline

  - stage: BuildAndAnalyze
    displayName: Build and Code Analysis
    dependsOn: LintAndTest
    condition: succeeded('LintAndTest')
    jobs:
      - job: BuildAndSonarQube
        displayName: Build and SonarQube Analysis
        steps:
          - checkout: self
            fetchDepth: 0

          - task: NodeTool@0
            displayName: Set up Node.js
            inputs:
              versionSpec: $(NODE_VERSION)

          - task: Cache@2
            displayName: Cache node_modules
            inputs:
              key: 'node_modules | "$(Agent.OS)" | "$(NODE_VERSION)" | package-lock.json'
              restoreKeys: |
                node_modules | "$(Agent.OS)" | "$(NODE_VERSION)"
              path: $(NODE_MODULES_CACHE_PATH)
              cacheHitVar: NODE_MODULES_CACHE_RESTORED

          - task: Cache@2
            displayName: Restore Next.js build cache
            inputs:
              key: 'nextjs | "$(Agent.OS)" | package-lock.json'
              restoreKeys: |
                nextjs | "$(Agent.OS)"
              path: .next/cache

          - script: npm ci $(NPM_CI_FLAGS)
            displayName: Install dependencies (cache miss)
            condition: ne(variables.NODE_MODULES_CACHE_RESTORED, 'true')

          - script: npm run build
            displayName: Build
            env:
              DATABASE_URL: postgresql://localhost/ci_placeholder
              NEXTAUTH_SECRET: ci-secret-placeholder
              NEXTAUTH_URL: http://localhost:3000
              NEXT_TELEMETRY_DISABLED: 1

  - stage: VercelPreview
    displayName: Deploy to Vercel Preview
    dependsOn: BuildAndAnalyze
    condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/develop'))
    jobs:
      - job: DeployPreview
        displayName: Deploy Preview to Vercel
        steps:
          - checkout: self
            fetchDepth: 2

          - task: NodeTool@0
            displayName: Set up Node.js
            inputs:
              versionSpec: $(NODE_VERSION)

          - script: |
              CHANGED_FILES=$(git diff --name-only HEAD~1 HEAD)
              if echo "$CHANGED_FILES" | grep -Eq '^(src/|app/|components/|contexts/|features/|hooks/|lib/|public/|server/|next\.config\.ts|package\.json|package-lock\.json|vercel\.json|postcss\.config\.js|eslint\.config\.js|tsconfig\.json|tsconfig\.check\.json)'; then
                echo "##vso[task.setvariable variable=SHOULD_DEPLOY]true"
              else
                echo "##vso[task.setvariable variable=SHOULD_DEPLOY]false"
                echo "No deploy-relevant changes detected."
              fi
            displayName: Detect deploy-relevant changes
          - script: npm ci --no-audit --no-fund
            condition: and(succeeded(), eq(variables['SHOULD_DEPLOY'], 'true'))

          - script: npm install --no-save --no-audit --fund=false --progress=false vercel
            displayName: Install Vercel CLI
            condition: and(succeeded(), eq(variables['SHOULD_DEPLOY'], 'true'))

          - script: |
              npx vercel pull --yes --environment=preview --token=$VERCEL_TOKEN
              cp .vercel/.env.preview.local .env.local
              npx vercel build --token=$VERCEL_TOKEN
              npx vercel deploy --prebuilt --token=$VERCEL_TOKEN
            displayName: Deploy to Vercel Preview
            condition: and(succeeded(), eq(variables['SHOULD_DEPLOY'], 'true'))
            env:
              VERCEL_TOKEN: $(VERCEL_TOKEN)
              VERCEL_ORG_ID: $(VERCEL_ORG_ID)
              VERCEL_PROJECT_ID: $(VERCEL_PROJECT_ID)
