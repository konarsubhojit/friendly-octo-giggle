trigger:
  branches:
    include:
      - develop
  paths:
    exclude:
      - docs/**
      - specs/**
      - '**/*.md'
      - .cursorrules

variables:
  NODE_VERSION: '22'
  npm_config_cache: $(Pipeline.Workspace)/.npm
  system.debug: true

stages:
  - stage: LintAndTest
    displayName: Lint, Type Check & Test
    jobs:
      - job: Lint
        displayName: Lint and Type Check
        pool:
          vmImage: ubuntu-latest
        steps:
          - task: NodeTool@0
            displayName: Set up Node.js
            inputs:
              versionSpec: $(NODE_VERSION)

          - task: Cache@2
            displayName: Cache npm packages
            inputs:
              key: 'npm | "$(Agent.OS)" | package-lock.json'
              restoreKeys: |
                npm | "$(Agent.OS)"
              path: $(npm_config_cache)

          - script: npm ci
            displayName: Install dependencies

          - script: npm run lint
            displayName: Lint

          - script: npx tsc --noEmit -p tsconfig.check.json
            displayName: Type check

      - job: Test
        displayName: Test
        pool:
          vmImage: ubuntu-latest
        steps:
          - task: NodeTool@0
            displayName: Set up Node.js
            inputs:
              versionSpec: $(NODE_VERSION)

          - task: Cache@2
            displayName: Cache npm packages
            inputs:
              key: 'npm | "$(Agent.OS)" | package-lock.json'
              restoreKeys: |
                npm | "$(Agent.OS)"
              path: $(npm_config_cache)

          - script: npm ci
            displayName: Install dependencies

          - script: npm run test:coverage
            displayName: Run tests with coverage

          - task: PublishPipelineArtifact@1
            displayName: Upload coverage report
            inputs:
              targetPath: coverage
              artifact: coverage-report
              publishLocation: pipeline

  - stage: BuildAndAnalyze
    displayName: Build and Code Analysis
    dependsOn: LintAndTest
    condition: succeeded('LintAndTest')
    jobs:
      - job: BuildAndSonarQube
        displayName: Build and SonarQube Analysis
        pool:
          vmImage: ubuntu-latest
        steps:
          - checkout: self
            fetchDepth: 0

          - task: NodeTool@0
            displayName: Set up Node.js
            inputs:
              versionSpec: $(NODE_VERSION)

          - task: Cache@2
            displayName: Cache npm packages
            inputs:
              key: 'npm | "$(Agent.OS)" | package-lock.json'
              restoreKeys: |
                npm | "$(Agent.OS)"
              path: $(npm_config_cache)

          - task: Cache@2
            displayName: Restore Next.js build cache
            inputs:
              key: 'nextjs | "$(Agent.OS)" | package-lock.json'
              restoreKeys: |
                nextjs | "$(Agent.OS)"
              path: .next/cache

          - script: npm ci
            displayName: Install dependencies

          - script: npm run build
            displayName: Build
            env:
              DATABASE_URL: postgresql://localhost/ci_placeholder
              NEXTAUTH_SECRET: ci-secret-placeholder
              NEXTAUTH_URL: http://localhost:3000
              NEXT_TELEMETRY_DISABLED: 1

  - stage: VercelPreview
    displayName: Deploy to Vercel Preview
    dependsOn: BuildAndAnalyze
    condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/develop'))
    jobs:
      - job: DeployPreview
        displayName: Deploy Preview to Vercel
        pool:
          vmImage: ubuntu-latest
        steps:
          - task: NodeTool@0
            displayName: Set up Node.js
            inputs:
              versionSpec: $(NODE_VERSION)

          - script: npm install vercel
            displayName: Install Vercel CLI

          - script: |
              npx vercel pull --yes --environment=preview --token=$VERCEL_TOKEN
              npx vercel build --token=$VERCEL_TOKEN
              npx vercel deploy --prebuilt --token=$VERCEL_TOKEN
            displayName: Deploy to Vercel Preview
            env:
              VERCEL_TOKEN: $(VERCEL_TOKEN)
              VERCEL_ORG_ID: $(VERCEL_ORG_ID)
              VERCEL_PROJECT_ID: $(VERCEL_PROJECT_ID)
